<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nailo Remote</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg:       #0a0e0f;
    --surface:  #111617;
    --surface2: #181f20;
    --surface3: #1e2829;
    --border:   #1f2e30;
    --border2:  #2a3d3f;

    --teal:     #0fd4c4;
    --teal-dim: #0a9f93;
    --teal-glow:rgba(15,212,196,0.15);
    --teal-bg:  rgba(15,212,196,0.08);

    --text:     #dff0f0;
    --muted:    #5a7a7d;
    --muted2:   #3d5a5c;

    --green:    #22d47a;
    --green-bg: rgba(34,212,122,0.08);
    --red:      #e05555;
    --red-bg:   rgba(224,85,85,0.08);
    --amber:    #e0a030;

    --radius:   14px;
    --radius-sm:10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* ══ LOGIN ══ */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
    background: radial-gradient(ellipse at 50% 0%, rgba(15,212,196,0.06) 0%, transparent 65%);
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 28px;
    width: 100%; max-width: 360px;
  }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px; letter-spacing: 6px;
    color: var(--teal);
    text-shadow: 0 0 30px rgba(15,212,196,0.4);
  }
  .login-logo p { color: var(--muted); font-size: 12px; margin-top: 6px; letter-spacing: 1px; text-transform: uppercase; }
  .field { margin-bottom: 12px; }
  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    color: var(--text);
    font-size: 15px; font-family: inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(15,212,196,0.1); }
  .btn-login {
    width: 100%; margin-top: 8px;
    background: var(--teal); color: #000;
    border: none; border-radius: var(--radius-sm);
    padding: 15px; font-size: 15px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-login:active { transform: scale(0.98); opacity: 0.85; }
  .login-error { color: var(--red); font-size: 12px; text-align: center; margin-top: 10px; min-height: 16px; }

  /* ══ TOPBAR ══ */
  #app-screen { display: none; }
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px; letter-spacing: 4px;
    color: var(--teal);
  }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .status-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 20px; padding: 5px 10px;
    font-size: 11px; color: var(--muted);
    transition: all 0.3s;
  }
  .status-pill.online { border-color: var(--green); color: var(--green); background: var(--green-bg); }
  .status-pill.online .dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted2); transition: all 0.3s; }
  .btn-logout {
    background: none; border: 1px solid var(--border2);
    color: var(--muted); border-radius: 8px;
    padding: 6px 10px; font-size: 11px; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* ══ LAYOUT ══ */
  .content { padding: 16px; max-width: 600px; margin: 0 auto; padding-bottom: 40px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex; align-items: center; justify-content: space-between;
  }

  /* ══ PC BLOCK ══ */
  .pc-card {
    display: flex; align-items: center; gap: 16px;
    background: var(--surface2);
    border: 1.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 18px;
    cursor: pointer;
    transition: all 0.25s;
    user-select: none;
  }
  .pc-card.offline { border-color: var(--border2); }
  .pc-card.booting { border-color: var(--amber); background: rgba(224,160,48,0.06); animation: pulse-amber 1.5s infinite; }
  .pc-card.online  { border-color: var(--green);  background: var(--green-bg); }
  @keyframes pulse-amber { 0%,100%{opacity:1} 50%{opacity:0.7} }
  .pc-card:active { transform: scale(0.99); }
  .pc-icon-wrap {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    background: var(--surface3);
    border: 1px solid var(--border2);
    flex-shrink: 0;
    transition: all 0.3s;
  }
  .pc-card.online .pc-icon-wrap  { background: var(--green-bg); border-color: var(--green); }
  .pc-card.booting .pc-icon-wrap { background: rgba(224,160,48,0.1); border-color: var(--amber); }
  .pc-info { flex: 1; }
  .pc-info h3 { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
  .pc-info p  { font-size: 12px; color: var(--muted); }
  .pc-action {
    font-size: 11px; font-weight: 600;
    padding: 7px 14px;
    border-radius: 8px; border: 1.5px solid;
    cursor: pointer; transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .pc-action.wake { border-color: var(--teal); color: var(--teal); background: var(--teal-bg); }
  .pc-action.wake:active { background: var(--teal); color: #000; }
  .pc-action.on   { border-color: var(--green); color: var(--green); background: var(--green-bg); cursor: default; }

  /* ══ SENSORS ══ */
  .sensor-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .sensor-box {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 16px;
    text-align: center;
    transition: border-color 0.3s;
  }
  .sensor-box.fresh { border-color: var(--teal); }
  .sensor-emoji { font-size: 22px; margin-bottom: 8px; }
  .sensor-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px; font-weight: 500;
    color: var(--text);
    line-height: 1;
  }
  .sensor-num .unit { font-size: 14px; color: var(--muted); }
  .sensor-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .sensor-footer {
    display: flex; align-items: center; justify-content: space-between;
  }
  .sensor-time { font-size: 11px; color: var(--muted2); }
  .btn-refresh {
    font-size: 11px; font-weight: 600;
    color: var(--teal); background: var(--teal-bg);
    border: 1px solid var(--teal-dim);
    border-radius: 8px; padding: 5px 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-refresh:active { background: var(--teal); color: #000; }
  .btn-refresh.loading { opacity: 0.5; pointer-events: none; }

  /* ══ CHAT ══ */
  .chat-messages {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    min-height: 130px; max-height: 240px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 10px;
    scroll-behavior: smooth;
  }
  .msg { max-width: 82%; padding: 9px 13px; border-radius: 12px; font-size: 13.5px; line-height: 1.45; }
  .msg.user  { background: var(--teal); color: #000; align-self: flex-end; border-bottom-right-radius: 3px; font-weight: 500; }
  .msg.kate  { background: var(--surface3); border: 1px solid var(--border2); color: var(--text); align-self: flex-start; border-bottom-left-radius: 3px; }
  .msg.sys   { color: var(--muted2); font-size: 11px; align-self: center; background: none; padding: 1px 0; }
  .chat-row  { display: flex; gap: 8px; }
  .chat-in   { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; }
  .chat-in:focus { border-color: var(--teal); }
  .btn-send  { background: var(--teal); color: #000; border: none; border-radius: var(--radius-sm); padding: 12px 16px; font-size: 16px; cursor: pointer; transition: opacity 0.2s, transform 0.1s; font-weight: 700; }
  .btn-send:active { transform: scale(0.94); opacity: 0.8; }
  .kate-typing { display: none; align-self: flex-start; color: var(--muted); font-size: 12px; padding: 4px 0; }
  .kate-typing.show { display: block; }

  /* ══ RELAY ══ */
  .relay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .relay-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 14px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    user-select: none;
  }
  .relay-btn:active { transform: scale(0.96); }
  .relay-btn.active {
    border-color: var(--teal);
    background: var(--teal-bg);
    box-shadow: inset 0 0 0 1px rgba(15,212,196,0.1);
  }
  .relay-btn.pending {
    opacity: 0.6;
    pointer-events: none;
  }
  .relay-tag {
    position: absolute; top: 7px; right: 8px;
    font-size: 9px; font-weight: 600; letter-spacing: 0.5px;
    color: var(--muted2);
    font-family: 'JetBrains Mono', monospace;
  }
  .relay-btn.active .relay-tag { color: var(--teal-dim); }
  .relay-ico { font-size: 20px; }
  .relay-name { font-size: 12px; color: var(--text); font-weight: 500; text-align: center; }
  .relay-state {
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
    color: var(--muted2); text-transform: uppercase;
    transition: color 0.2s;
  }
  .relay-btn.active .relay-state { color: var(--teal); }
  .relay-all { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .btn-all {
    background: none; border: 1px solid var(--border2);
    color: var(--muted); border-radius: 8px;
    padding: 9px; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-all:active { background: var(--teal-bg); border-color: var(--teal); color: var(--teal); }

  /* ══ SERVO ══ */
  .servo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .servo-item label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 8px; font-weight: 500; letter-spacing: 0.5px; }
  .servo-item input[type="range"] { width: 100%; accent-color: var(--teal); cursor: pointer; height: 4px; }
  .servo-val { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--teal); margin-top: 5px; }
  .servo-cmd {
    margin-top: 12px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 10px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--muted);
  }
  .btn-servo {
    width: 100%; margin-top: 10px;
    background: var(--teal); color: #000;
    border: none; border-radius: var(--radius-sm);
    padding: 14px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .btn-servo:active { transform: scale(0.98); opacity: 0.85; }
  .btn-servo.sent { background: var(--green); }

  /* ══ TOAST ══ */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface3); border: 1px solid var(--teal);
    color: var(--teal); border-radius: 10px;
    padding: 10px 20px; font-size: 13px; font-weight: 500;
    z-index: 999; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <h1>NAILO</h1>
      <p>Система управления домом</p>
    </div>
    <div class="field"><input type="email" id="email" placeholder="Email" autocomplete="email"></div>
    <div class="field"><input type="password" id="password" placeholder="Пароль" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-login" onclick="doLogin()">Войти</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-logo">NAILO</div>
    <div class="topbar-right">
      <div class="status-pill" id="pill-esp"><div class="dot"></div><span>ESP32</span></div>
      <button class="btn-logout" onclick="doLogout()">Выйти</button>
    </div>
  </div>

  <div class="content">

    <!-- PC -->
    <div class="card">
      <div class="card-title">Компьютер</div>
      <div class="pc-card offline" id="pc-card">
        <div class="pc-icon-wrap" id="pc-icon">🖥️</div>
        <div class="pc-info">
          <h3 id="pc-title">Выключен</h3>
          <p id="pc-sub">ESP32 отправит сигнал включения</p>
        </div>
        <div class="pc-action wake" id="pc-action" onclick="wakePC()">Включить</div>
      </div>
    </div>

    <!-- КЛИМАТ -->
    <div class="card">
      <div class="card-title">
        <span>Климат</span>
      </div>
      <div class="sensor-row">
        <div class="sensor-box" id="box-temp">
          <div class="sensor-emoji">🌡️</div>
          <div class="sensor-num" id="val-temp">—<span class="unit"> °C</span></div>
          <div class="sensor-lbl">Температура</div>
        </div>
        <div class="sensor-box" id="box-hum">
          <div class="sensor-emoji">💧</div>
          <div class="sensor-num" id="val-hum">—<span class="unit"> %</span></div>
          <div class="sensor-lbl">Влажность</div>
        </div>
      </div>
      <div class="sensor-footer">
        <span class="sensor-time" id="sensor-time">Нет данных</span>
        <button class="btn-refresh" id="btn-refresh" onclick="refreshSensors()">↻ Обновить</button>
      </div>
    </div>

    <!-- ЧАТ -->
    <div class="card">
      <div class="card-title">Кейт</div>
      <div class="chat-messages" id="chat-box">
        <div class="msg sys">Подключение...</div>
      </div>
      <div class="chat-row">
        <input class="chat-in" id="chat-in" type="text" placeholder="Написать Кейт..."
          onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="btn-send" onclick="sendMsg()">▶</button>
      </div>
    </div>

    <!-- РЕЛЕ -->
    <div class="card">
      <div class="card-title">Реле</div>
      <div class="relay-grid" id="relay-grid"></div>
      <div class="relay-all">
        <button class="btn-all" onclick="relayAll(true)">⚡ Все включить</button>
        <button class="btn-all" onclick="relayAll(false)">○ Все выключить</button>
      </div>
    </div>

    <!-- СЕРВО -->
    <div class="card">
      <div class="card-title">Сервоприводы</div>
      <div class="servo-grid">
        <div class="servo-item">
          <label>БАЗА</label>
          <input type="range" min="0" max="180" value="90" id="sv-b" oninput="updateServo()">
          <div class="servo-val" id="vb">90°</div>
        </div>
        <div class="servo-item">
          <label>ПЛЕЧО</label>
          <input type="range" min="0" max="180" value="90" id="sv-p" oninput="updateServo()">
          <div class="servo-val" id="vp">90°</div>
        </div>
        <div class="servo-item">
          <label>ЛОКОТЬ</label>
          <input type="range" min="0" max="180" value="90" id="sv-l" oninput="updateServo()">
          <div class="servo-val" id="vl">90°</div>
        </div>
        <div class="servo-item">
          <label>КАМЕРА</label>
          <input type="range" min="0" max="180" value="90" id="sv-k" oninput="updateServo()">
          <div class="servo-val" id="vk">90°</div>
        </div>
      </div>
      <div class="servo-cmd" id="servo-cmd">servo:b90p90l90k90</div>
      <button class="btn-servo" id="btn-servo" onclick="sendServos()">Отправить положение</button>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, onValue }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyDdVxg4VLuhTP6diYR3ylwVUH5d_6TXQhE",
  authDomain: "nailo-343e0.firebaseapp.com",
  databaseURL: "https://nailo-343e0-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "nailo-343e0",
  storageBucket: "nailo-343e0.firebasestorage.app",
  messagingSenderId: "400611042263",
  appId: "1:400611042263:web:979fc6905ed4f39b902192"
});
const auth = getAuth(app);
const db   = getDatabase(app);

// ── Названия реле — меняй под свои устройства ──
const RELAY_CFG = [
  { name: "Свет",    icon: "💡" },
  { name: "Свет 2",  icon: "💡" },
  { name: "Реле 3",  icon: "🔌" },
  { name: "Реле 4",  icon: "🔌" },
  { name: "Реле 5",  icon: "🔌" },
  { name: "Реле 6",  icon: "🔌" },
  { name: "Реле 7",  icon: "🔌" },
  { name: "Реле 8",  icon: "🔌" },
];

let relayStates  = new Array(8).fill(false);
let relayPending = new Array(8).fill(false);
let pcOnline     = false;
let pcBooting    = false;
let lastKate     = "";

// ══ TOAST ══
function toast(msg, duration = 1800) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), duration);
}

// ══ AUTH ══
window.doLogin = async () => {
  const email = document.getElementById("email").value.trim();
  const pass  = document.getElementById("password").value;
  const errEl = document.getElementById("login-error");
  errEl.textContent = "";
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    errEl.textContent = "Неверный email или пароль";
  }
};
window.doLogout = () => signOut(auth);

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app-screen").style.display  = "block";
    buildRelays();
    startListeners();
  } else {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app-screen").style.display  = "none";
  }
});

// ══ RELAY BUILD ══
function buildRelays() {
  const grid = document.getElementById("relay-grid");
  grid.innerHTML = "";
  RELAY_CFG.forEach((cfg, i) => {
    const num = i + 1;
    const btn = document.createElement("div");
    btn.className = "relay-btn";
    btn.id = "rb" + num;
    btn.innerHTML = `
      <span class="relay-tag">IN${num}</span>
      <div class="relay-ico">${cfg.icon}</div>
      <div class="relay-name">${cfg.name}</div>
      <div class="relay-state" id="rs${num}">ВЫКЛ</div>`;
    btn.onclick = () => toggleRelay(num);
    grid.appendChild(btn);
  });
}

// ══ LISTENERS ══
function startListeners() {
  addMsg("sys", "Подключено ✓");

  // ESP32
  onValue(ref(db, "/status/esp32_online"), s => {
    const on = s.val() === true;
    const pill = document.getElementById("pill-esp");
    pill.className = "status-pill" + (on ? " online" : "");
    pill.querySelector("span").textContent = on ? "ESP32" : "ESP32 офлайн";
  });

  // PC
  onValue(ref(db, "/status/pc_online"), s => {
    const on = s.val() === true;
    if (on && pcBooting) { pcBooting = false; toast("ПК включился ✓"); }
    pcOnline = on;
    updatePcUI();
  });

  // Kate reply
  onValue(ref(db, "/chat/kate_reply"), s => {
    const r = s.val();
    if (r && r !== "" && r !== lastKate) {
      lastKate = r;
      addMsg("kate", r);
    }
  });

  // Devices/relays
  onValue(ref(db, "/devices"), s => {
    const d = s.val() || {};
    for (let i = 1; i <= 8; i++) {
      const newState = !!d["relay" + i];
      if (newState !== relayStates[i-1]) {
        relayStates[i-1]  = newState;
        relayPending[i-1] = false;
        updateRelayUI(i);
      }
    }
  });

  // Sensors
  onValue(ref(db, "/sensors"), s => {
    const d = s.val() || {};
    if (d.temperature !== undefined && d.temperature !== null) {
      document.getElementById("val-temp").innerHTML = d.temperature + '<span class="unit"> °C</span>';
      document.getElementById("box-temp").classList.add("fresh");
      setTimeout(() => document.getElementById("box-temp").classList.remove("fresh"), 2000);
    }
    if (d.humidity !== undefined && d.humidity !== null) {
      document.getElementById("val-hum").innerHTML = d.humidity + '<span class="unit"> %</span>';
      document.getElementById("box-hum").classList.add("fresh");
      setTimeout(() => document.getElementById("box-hum").classList.remove("fresh"), 2000);
    }
    const now = new Date();
    document.getElementById("sensor-time").textContent =
      "Обновлено в " + now.toLocaleTimeString("ru-RU", {hour:"2-digit", minute:"2-digit"});
    document.getElementById("btn-refresh").classList.remove("loading");
  });
}

// ══ PC ══
function updatePcUI() {
  const card   = document.getElementById("pc-card");
  const title  = document.getElementById("pc-title");
  const sub    = document.getElementById("pc-sub");
  const action = document.getElementById("pc-action");

  if (pcBooting) {
    card.className  = "pc-card booting";
    title.textContent = "Включается...";
    sub.textContent   = "Magic Packet отправлен";
    action.className  = "pc-action";
    action.textContent = "⏳";
  } else if (pcOnline) {
    card.className  = "pc-card online";
    title.textContent = "Онлайн";
    sub.textContent   = "Кейт готова к работе";
    action.className  = "pc-action on";
    action.textContent = "● Активен";
    action.onclick    = null;
  } else {
    card.className  = "pc-card offline";
    title.textContent = "Выключен";
    sub.textContent   = "ESP32 отправит Magic Packet";
    action.className  = "pc-action wake";
    action.textContent = "Включить";
    action.onclick    = wakePC;
  }
}

window.wakePC = async () => {
  if (pcOnline || pcBooting) return;
  pcBooting = true;
  updatePcUI();
  await set(ref(db, "/commands/pending"), "pc:wakeup");
  toast("Сигнал включения отправлен");
  // Таймаут — если через 60 сек не включился, сбросить
  setTimeout(() => { if (!pcOnline) { pcBooting = false; updatePcUI(); } }, 60000);
};

// ══ CHAT ══
window.sendMsg = async () => {
  const inp  = document.getElementById("chat-in");
  const text = inp.value.trim();
  if (!text) return;
  inp.value = "";
  addMsg("user", text);
  lastKate = "";
  await set(ref(db, "/chat/kate_reply"), "");
  await set(ref(db, "/chat/user_message"), text);
};
function addMsg(type, text) {
  const box = document.getElementById("chat-box");
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = type === "kate" ? "Кейт: " + text : text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// ══ RELAY ══
window.toggleRelay = async (num) => {
  if (relayPending[num-1]) return;
  relayPending[num-1] = true;
  const btn = document.getElementById("rb" + num);
  btn.classList.add("pending");
  const newState = !relayStates[num-1];
  await set(ref(db, "/commands/pending"), `relay${num}:${newState ? "on" : "off"}`);
  // Таймаут защита — если Firebase не ответил
  setTimeout(() => {
    relayPending[num-1] = false;
    btn.classList.remove("pending");
  }, 3000);
};
window.relayAll = async (on) => {
  await set(ref(db, "/commands/pending"), "relay:all:" + (on ? "on" : "off"));
  toast(on ? "Все реле включены" : "Все реле выключены");
};
function updateRelayUI(num) {
  const btn = document.getElementById("rb" + num);
  const st  = document.getElementById("rs" + num);
  if (!btn) return;
  const on = relayStates[num-1];
  btn.classList.toggle("active", on);
  btn.classList.remove("pending");
  st.textContent = on ? "ВКЛ" : "ВЫКЛ";
}

// ══ SENSORS ══
window.refreshSensors = async () => {
  document.getElementById("btn-refresh").classList.add("loading");
  document.getElementById("sensor-time").textContent = "Запрос...";
  await set(ref(db, "/commands/pending"), "sensors:get");
  setTimeout(() => document.getElementById("btn-refresh").classList.remove("loading"), 5000);
};

// ══ SERVO ══
window.updateServo = () => {
  const b = document.getElementById("sv-b").value;
  const p = document.getElementById("sv-p").value;
  const l = document.getElementById("sv-l").value;
  const k = document.getElementById("sv-k").value;
  document.getElementById("vb").textContent = b + "°";
  document.getElementById("vp").textContent = p + "°";
  document.getElementById("vl").textContent = l + "°";
  document.getElementById("vk").textContent = k + "°";
  document.getElementById("servo-cmd").textContent = `servo:b${b}p${p}l${l}k${k}`;
};
window.sendServos = async () => {
  const b = document.getElementById("sv-b").value;
  const p = document.getElementById("sv-p").value;
  const l = document.getElementById("sv-l").value;
  const k = document.getElementById("sv-k").value;
  const cmd = `servo:b${b}p${p}l${l}k${k}`;
  const btn = document.getElementById("btn-servo");
  await set(ref(db, "/commands/pending"), cmd);
  btn.classList.add("sent");
  btn.textContent = "Отправлено ✓";
  setTimeout(() => { btn.classList.remove("sent"); btn.textContent = "Отправить положение"; }, 1500);
  toast("Положение отправлено");
};
</script>
