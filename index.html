<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nailo Remote</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --surface2: #22222e;
    --border: #2e2e3e; --accent: #7c6af7; --accent2: #5b52c7;
    --text: #e8e8f0; --muted: #888899;
    --green: #4caf7d; --red: #e05555;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* LOGIN */
  #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px 28px; width: 100%; max-width: 360px; }
  .login-logo { text-align: center; margin-bottom: 28px; }
  .login-logo h1 { font-size: 28px; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
  .login-logo p { color: var(--muted); font-size: 13px; margin-top: 4px; }
  input[type="email"], input[type="password"] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 13px 16px; color: var(--text); font-size: 15px;
    margin-bottom: 12px; outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  .btn-primary { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; margin-top: 4px; }
  .btn-primary:active { transform: scale(0.98); background: var(--accent2); }
  .login-error { color: var(--red); font-size: 13px; text-align: center; margin-top: 12px; min-height: 18px; }

  /* APP */
  #app-screen { display: none; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .topbar h1 { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .status-row { display: flex; gap: 10px; align-items: center; }
  .status-dot { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); transition: background 0.3s; }
  .dot.online { background: var(--green); }
  .btn-logout { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
  .content { padding: 16px; max-width: 600px; margin: 0 auto; }
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 14px; }

  /* CHAT */
  .chat-messages { background: var(--surface2); border-radius: 10px; padding: 12px; min-height: 140px; max-height: 260px; overflow-y: auto; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; }
  .msg { max-width: 85%; padding: 9px 13px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
  .msg.user { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg.kate { background: var(--border); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg.system { color: var(--muted); font-size: 12px; align-self: center; background: none; padding: 2px 0; }
  .chat-input-row { display: flex; gap: 8px; }
  .chat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; }
  .chat-input:focus { border-color: var(--accent); }
  .btn-send { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 12px 18px; font-size: 18px; cursor: pointer; transition: background 0.2s, transform 0.1s; }
  .btn-send:active { transform: scale(0.95); background: var(--accent2); }

  /* PC */
  .pc-btn { width: 100%; background: var(--surface2); border: 2px solid var(--border); border-radius: 12px; padding: 18px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.2s; text-align: left; }
  .pc-btn:active { transform: scale(0.98); }
  .pc-btn.online-state { border-color: var(--green); background: rgba(76,175,125,0.08); }
  .pc-icon { font-size: 32px; }
  .pc-info h3 { font-size: 15px; font-weight: 600; }
  .pc-info p  { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* DEVICES */
  .device-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .device-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 12px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s, transform 0.1s; }
  .device-btn:active { transform: scale(0.97); }
  .device-btn.active { border-color: var(--accent); background: rgba(124,106,247,0.12); }
  .device-btn.active .device-icon, .device-btn.active .device-state { color: var(--accent); }
  .device-icon { font-size: 26px; }
  .device-label { font-size: 13px; color: var(--muted); }
  .device-state { font-size: 11px; font-weight: 600; color: var(--muted); }

  /* SERVO */
  .servo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .servo-item label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
  .servo-item input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
  .servo-val { font-size: 13px; font-weight: 600; color: var(--accent); margin-top: 4px; }
  .btn-servo-send { width: 100%; margin-top: 14px; background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-servo-send:active { background: var(--accent2); transform: scale(0.98); }
  .servo-preview { margin-top: 10px; background: var(--surface2); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--muted); font-family: monospace; letter-spacing: 0.5px; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <h1>NAILO</h1>
      <p>Система удалённого управления</p>
    </div>
    <input type="email" id="email" placeholder="Email" autocomplete="email">
    <input type="password" id="password" placeholder="Пароль" autocomplete="current-password">
    <button class="btn-primary" onclick="doLogin()">Войти</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app-screen">
  <div class="topbar">
    <h1>NAILO</h1>
    <div class="status-row">
      <div class="status-dot"><div class="dot" id="dot-pc"></div><span>ПК</span></div>
      <div class="status-dot"><div class="dot" id="dot-esp"></div><span>ESP32</span></div>
      <button class="btn-logout" onclick="doLogout()">Выйти</button>
    </div>
  </div>

  <div class="content">

    <!-- CHAT -->
    <div class="section">
      <div class="section-title">💬 Чат с Кейт</div>
      <div class="chat-messages" id="chat-messages">
        <div class="msg system">Подключение...</div>
      </div>
      <div class="chat-input-row">
        <input class="chat-input" id="chat-input" type="text" placeholder="Написать Кейт..."
          onkeydown="if(event.key==='Enter') sendMessage()">
        <button class="btn-send" onclick="sendMessage()">➤</button>
      </div>
    </div>

    <!-- PC -->
    <div class="section">
      <div class="section-title">🖥️ Компьютер</div>
      <div class="pc-btn" id="pc-btn" onclick="togglePC()">
        <div class="pc-icon">🖥️</div>
        <div class="pc-info">
          <h3 id="pc-title">ПК выключен</h3>
          <p id="pc-sub">Нажми чтобы включить через ESP32</p>
        </div>
      </div>
    </div>

    <!-- УСТРОЙСТВА -->
    <div class="section">
      <div class="section-title">🏠 Устройства</div>
      <div class="device-grid">
        <div class="device-btn" id="btn-light" onclick="toggleDevice('light_room','light:')">
          <div class="device-icon">💡</div>
          <div class="device-label">Свет</div>
          <div class="device-state" id="state-light">выкл</div>
        </div>
        <div class="device-btn" id="btn-relay1" onclick="toggleDevice('relay_1','relay1:')">
          <div class="device-icon">🔌</div>
          <div class="device-label">Реле 1</div>
          <div class="device-state" id="state-relay1">выкл</div>
        </div>
      </div>
    </div>

    <!-- SERVO -->
    <div class="section">
      <div class="section-title">🤖 Сервоприводы</div>
      <div class="servo-grid">
        <div class="servo-item">
          <label>База (b)</label>
          <input type="range" min="0" max="180" value="90" id="servo-b" oninput="updateServo()">
          <div class="servo-val" id="val-b">90°</div>
        </div>
        <div class="servo-item">
          <label>Плечо (p)</label>
          <input type="range" min="0" max="180" value="90" id="servo-p" oninput="updateServo()">
          <div class="servo-val" id="val-p">90°</div>
        </div>
        <div class="servo-item">
          <label>Локоть (l)</label>
          <input type="range" min="0" max="180" value="90" id="servo-l" oninput="updateServo()">
          <div class="servo-val" id="val-l">90°</div>
        </div>
        <div class="servo-item">
          <label>Камера (k)</label>
          <input type="range" min="0" max="180" value="90" id="servo-k" oninput="updateServo()">
          <div class="servo-val" id="val-k">90°</div>
        </div>
      </div>
      <!-- превью команды -->
      <div class="servo-preview" id="servo-preview">servo:b90p90l90k90</div>
      <button class="btn-servo-send" onclick="sendServos()">Отправить положение</button>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, onValue }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyDdVxg4VLuhTP6diYR3ylwVUH5d_6TXQhE",
  authDomain: "nailo-343e0.firebaseapp.com",
  databaseURL: "https://nailo-343e0-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "nailo-343e0",
  storageBucket: "nailo-343e0.firebasestorage.app",
  messagingSenderId: "400611042263",
  appId: "1:400611042263:web:979fc6905ed4f39b902192"
});
const auth = getAuth(app);
const db   = getDatabase(app);

let deviceStates = { light_room: false, relay_1: false };
let pcOnline = false;
let lastKateReply = "";

// ── AUTH ──
window.doLogin = async () => {
  const email = document.getElementById("email").value.trim();
  const pass  = document.getElementById("password").value;
  document.getElementById("login-error").textContent = "";
  try { await signInWithEmailAndPassword(auth, email, pass); }
  catch(e) { document.getElementById("login-error").textContent = "Неверный email или пароль"; }
};
window.doLogout = () => signOut(auth);

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app-screen").style.display = "block";
    startListeners();
  } else {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app-screen").style.display = "none";
  }
});

// ── LISTENERS ──
function startListeners() {
  addMsg("system", "Подключено ✓");

  onValue(ref(db, "/status/pc_online"), s => { pcOnline = s.val() === true; updatePcUI(); });
  onValue(ref(db, "/status/esp32_online"), s => {
    document.getElementById("dot-esp").className = "dot" + (s.val() === true ? " online" : "");
  });
  onValue(ref(db, "/chat/kate_reply"), s => {
    const r = s.val();
    if (r && r !== "" && r !== lastKateReply) { lastKateReply = r; addMsg("kate", r); }
  });
  onValue(ref(db, "/devices"), s => {
    const d = s.val() || {};
    deviceStates.light_room = !!d.light_room;
    deviceStates.relay_1    = !!d.relay_1;
    updateDeviceUI("light",  deviceStates.light_room);
    updateDeviceUI("relay1", deviceStates.relay_1);
  });
}

// ── CHAT ──
window.sendMessage = async () => {
  const input = document.getElementById("chat-input");
  const text  = input.value.trim();
  if (!text) return;
  input.value = "";
  addMsg("user", text);
  await set(ref(db, "/chat/kate_reply"), "");
  await set(ref(db, "/chat/user_message"), text);
  lastKateReply = "";
};
function addMsg(type, text) {
  const box = document.getElementById("chat-messages");
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = type === "kate" ? "Кейт: " + text : text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// ── PC ──
function updatePcUI() {
  document.getElementById("dot-pc").className = "dot" + (pcOnline ? " online" : "");
  document.getElementById("pc-btn").className = "pc-btn" + (pcOnline ? " online-state" : "");
  document.getElementById("pc-title").textContent = pcOnline ? "ПК онлайн" : "ПК выключен";
  document.getElementById("pc-sub").textContent   = pcOnline ? "Кейт готова к работе" : "Нажми чтобы включить через ESP32";
}
window.togglePC = async () => {
  if (!pcOnline) { await set(ref(db, "/commands/pending"), "pc:wakeup"); addMsg("system", "Сигнал включения отправлен..."); }
};

// ── DEVICES ──
window.toggleDevice = async (key, prefix) => {
  const newState = !deviceStates[key];
  await set(ref(db, "/commands/pending"), prefix + (newState ? "on" : "off"));
};
function updateDeviceUI(name, state) {
  document.getElementById("btn-" + name).className = "device-btn" + (state ? " active" : "");
  document.getElementById("state-" + name).textContent = state ? "вкл" : "выкл";
}

// ── SERVO ──
window.updateServo = () => {
  const b = document.getElementById("servo-b").value;
  const p = document.getElementById("servo-p").value;
  const l = document.getElementById("servo-l").value;
  const k = document.getElementById("servo-k").value;
  document.getElementById("val-b").textContent = b + "°";
  document.getElementById("val-p").textContent = p + "°";
  document.getElementById("val-l").textContent = l + "°";
  document.getElementById("val-k").textContent = k + "°";
  document.getElementById("servo-preview").textContent = `servo:b${b}p${p}l${l}k${k}`;
};

window.sendServos = async () => {
  const b = document.getElementById("servo-b").value;
  const p = document.getElementById("servo-p").value;
  const l = document.getElementById("servo-l").value;
  const k = document.getElementById("servo-k").value;
  const cmd = `servo:b${b}p${p}l${l}k${k}`;
  await set(ref(db, "/commands/pending"), cmd);
  addMsg("system", "Серво → " + cmd);
};
</script>
</body>
</html>
